deployment:
  tasks:
    # 1. Sync aplikasi (TERMASUK vendor)
    - rsync -av --delete \
      --exclude='.env' \
      --exclude='storage' \
      --exclude='public' \
      --exclude='node_modules' \
      /home/akkpwaka/repositories/profil.akkpwakatobi.ac.id/ \
      /home/akkpwaka/profil.akkpwakatobi.ac.id/

    # 2. Sync public ke public_html
    - rsync -av --delete \
      --exclude='uploads' \
      --exclude='index.php' \
      /home/akkpwaka/repositories/profil.akkpwakatobi.ac.id/public/ \
      /home/akkpwaka/public_html/profil/

    # 3. Optimize Laravel
    - cd /home/akkpwaka/profil.akkpwakatobi.ac.id
    - php artisan optimize:clear
