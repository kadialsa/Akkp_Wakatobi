deployment:
  tasks:
    # Masuk ke folder project aktif
    - cd /home/akkpwaka/profil.akkpwakatobi.ac.id

    # Copy folder penting (tanpa ganggu public/index.php)
    - /bin/cp -r app /home/akkpwaka/profil.akkpwakatobi.ac.id
    - /bin/cp -r bootstrap /home/akkpwaka/profil.akkpwakatobi.ac.id
    - /bin/cp -r config /home/akkpwaka/profil.akkpwakatobi.ac.id
    - /bin/cp -r resources /home/akkpwaka/profil.akkpwakatobi.ac.id
    - /bin/cp -r routes /home/akkpwaka/profil.akkpwakatobi.ac.id

    # Update asset Vite (INI PENTING UNTUK CSS/JS)
    - /bin/cp -r public/build /home/akkpwaka/profil.akkpwakatobi.ac.id/public/

    # Optional (kalau ada asset tambahan)
    - /bin/cp -r public/assets /home/akkpwaka/profil.akkpwakatobi.ac.id/public/ || true
    - /bin/cp -r public/css /home/akkpwaka/profil.akkpwakatobi.ac.id/public/ || true
    - /bin/cp -r public/js /home/akkpwaka/profil.akkpwakatobi.ac.id/public/ || true

    # Clear cache Laravel
    - php artisan optimize:clear
